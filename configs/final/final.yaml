seed: 42

experiment:
  name: final_reproduction
  owner: final
  output_dir: outputs/final/final_reproduction

data:
  root: /content/data/spacepresso
  image_size: 224
  load_images: true

method:
  name: patchcore_lite
  backbone: wide_resnet50_2
  batch_size: 4
  out_indices: [2, 3]
  coreset_fraction: 0.01
  candidate_pool_size: 6000
  max_coreset_size: 2000
  projection_dim: 512
  bank_chunk_size: 2048
  sigma: 4.0

training:
  enabled: true
  mode: fit_memory_bank

submission:
  output_path: submissions/final/final_reproduction.csv

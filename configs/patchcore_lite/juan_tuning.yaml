seed: 42

experiment:
  name: patchcore_lite_tuning
  owner: juan
  output_dir: outputs/juan/patchcore_lite_tuning

data:
  root: /content/data/spacepresso
  image_size: 224
  load_images: false

method:
  name: patchcore_lite
  backbone: wide_resnet50_2
  batch_size: 4
  out_indices: [2, 3]
  coreset_fraction: 0.01
  candidate_pool_size: 6000
  max_coreset_size: 1000
  projection_dim: 512
  bank_chunk_size: 2048
  sigma: 4.0

training:
  enabled: true
  mode: fit_memory_bank

tuning:
  study_name: patchcore_lite_juan
  direction: maximize
  metric: pixel_ap
  n_trials: 10
  n_splits: 5
  folds: [0]
  good_fraction: 0.25
  anomaly_fraction: 1.0
  output_dir: outputs/juan/patchcore_lite_tuning/optuna
  search_space:
    coreset_fraction:
      low: 0.002
      high: 0.02
      log: true
    max_coreset_size:
      low: 500
      high: 2000
      step: 250
    candidate_pool_size:
      low: 2000
      high: 8000
      step: 1000
    projection_dim:
      choices: [128, 256, 512]
    sigma:
      low: 1.0
      high: 6.0
    out_indices:
      choices: ["2,3", "1,2,3"]

ranking:
  output_path: outputs/validation_rankings.csv

submission:
  output_path: submissions/juan/patchcore_lite_tuning_best.csv

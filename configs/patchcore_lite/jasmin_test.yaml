seed: 43

experiment:
  name: patchcore_lite_jasmin_test
  owner: jasmin
  output_dir: outputs/jasmin/patchcore_lite_jasmin_test

data:
  root: /content/data/spacepresso
  image_size: 224
  load_images: false

method:
  name: patchcore_lite
  backbone: wide_resnet50_2
  batch_size: 4
  out_indices: [2, 3]
  coreset_fraction: 0.02
  candidate_pool_size: 6000
  max_coreset_size: 2000
  projection_dim: 512
  bank_chunk_size: 2048
  sigma: 4.0

training:
  enabled: true
  mode: fit_memory_bank

ranking:
  output_path: outputs/validation_rankings.csv

submission:
  output_path: submissions/jasmin/patchcore_lite_jasmin_test.csv
